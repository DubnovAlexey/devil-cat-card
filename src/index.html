<div class="card">
    <div class="card-header">
        <img src="img/Devil%20Cat.jpg" alt="Devil Cat" class="profile-img">
        <div class="profile-info">
            <h1>Devil Cat Vasily</h1>
            <p class="job-title">Senior Night Galloper & Soul Demander</p>
        </div>
    </div>
    <div class="audio-block">
        <p class="audio-label">Photosynthesis Carbon Based Lifeforms:</p>
        <audio controls loop>
            <source src="audio/SpotiDownloader_com_Photosynthesis_Carbon_Based_Lifeforms.mp3">
        </audio>
    </div>
    <div class="links-container">
        <a href="img/screaming-cat.jpg" target="_blank" class="card-link">Call (Meow at your own risk)</a>
        <a href="img/explosion.jpg" target="_blank" class="card-link">Email (Demand food immediately)</a>
    </div>
    <div class="card-footer">
        <p class="contact-text">Emergency Phone: 666-CAT-HELL</p>
        <p class="contact-text">Location: Under your bed at 3:00 AM</p>
    </div>
</div>
